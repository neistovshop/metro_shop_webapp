<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оружие</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    background:
    radial-gradient(circle at 20% 30%, rgba(255,0,0,0.4), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,0,255,0.4), transparent 60%),
    #111;
    backdrop-filter: blur(8px);
}

/* Большая стрелка */
.back{
    position:fixed;
    top:20px;
    left:20px;
    font-size:40px;
    cursor:pointer;
    z-index:1000;
}

/* Контейнер */
.container{
    padding:100px 20px 140px 20px;
}

/* Квадраты категорий */
.category{
    background:#777;
    padding:35px;
    margin-bottom:25px;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

/* Эффект прострела */
.category::after{
    content:"";
    position:absolute;
    width:8px;
    height:8px;
    background:black;
    border-radius:50%;
    top:20%;
    left:30%;
    box-shadow:
        40px 25px black,
        70px 60px black;
}

/* Окно списка */
.weapon-box{
    display:none;
    background:black;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
}

.weapon-item{
    display:flex;
    align-items:center;
    margin-bottom:15px;
    background:#222;
    padding:10px;
    border-radius:10px;
}

.weapon-item img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:10px;
    margin-right:15px;
}

.weapon-info{
    flex:1;
}

.price-btn{
    background:gold;
    color:black;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
    margin-top:5px;
    display:inline-block;
}

/* Корзина внизу */
.cart{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:linear-gradient(145deg,#00aa00,#006600);
    padding:20px;
    text-align:center;
    font-weight:bold;
    box-shadow:0 -8px 20px rgba(0,0,0,0.6);
    cursor:pointer;
}

/* Колокольчик */
.bell{
    position:fixed;
    bottom:80px;
    right:25px;
    font-size:35px;
}

.bell-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:white;
    border-radius:50%;
    padding:2px 7px;
    font-size:13px;
}

/* Страница корзины */
.cart-page{
    display:none;
    padding:120px 20px;
}

.remove{
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⮜</div>

<!-- СТРАНИЦА ОРУЖИЯ -->
<div id="weaponPage" class="container">

<div class="category" onclick="toggleBox('shv')">ШВ</div>
<div id="shv" class="weapon-box">
<div class="weapon-item">
<img src="images/m416.jpg">
<div class="weapon-info">
<b>M416</b><br>
Штурмовая винтовка высшего качества.
<div class="price-btn" onclick="add('M416',35)">35₽</div>
</div>
</div>
</div>

<div class="category" onclick="toggleBox('sv')">СВ</div>
<div id="sv" class="weapon-box">
<div class="weapon-item">
<img src="images/awm.jpg">
<div class="weapon-info">
<b>AWM</b><br>
Снайперская винтовка высшего качества.
<div class="price-btn" onclick="add('AWM',99.99)">99.99₽</div>
</div>
</div>
</div>

</div>

<!-- СТРАНИЦА КОРЗИНЫ -->
<div id="cartPage" class="cart-page">
<h2>Корзина</h2>
<div id="cartItems"></div>
<hr>
Итого: <span id="total">0</span> ₽
</div>

<!-- Корзина кнопка -->
<div class="cart" onclick="openCart()">
🛒 КОРЗИНА
</div>

<!-- Колокольчик -->
<div class="bell">
🔔
<div id="bellCount" class="bell-count">0</div>
</div>

<script>
let total=0;
let count=0;

function toggleBox(id){
    const box=document.getElementById(id);
    box.style.display=box.style.display==="block"?"none":"block";
}

function add(name,price){
    const item=document.createElement("div");
    item.innerHTML=name+" - "+price+"₽ <button class='remove' onclick='remove(this,"+price+")'>X</button>";
    document.getElementById("cartItems").appendChild(item);
    total+=price;
    count++;
    update();
}

function remove(btn,price){
    btn.parentElement.remove();
    total-=price;
    count--;
    update();
}

function update(){
    document.getElementById("total").innerText=total.toFixed(2);
    document.getElementById("bellCount").innerText=count;
}

function openCart(){
    document.getElementById("weaponPage").style.display="none";
    document.getElementById("cartPage").style.display="block";
}

function goBack(){
    if(document.getElementById("cartPage").style.display==="block"){
        document.getElementById("cartPage").style.display="none";
        document.getElementById("weaponPage").style.display="block";
    } else {
        window.location.href="index.html";
    }
}
</script>

</body>
</html>
