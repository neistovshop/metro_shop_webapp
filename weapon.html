<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оружие</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(270deg,#111,#770000,#111);
    background-size:400% 400%;
    animation:bg 10s infinite alternate;
    color:white;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

.container{
    padding:20px;
    margin-right:90px;
}

.category{
    background:red;
    padding:25px;
    margin-bottom:20px;
    border-radius:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.weapon-box{
    display:none;
    background:black;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
}

.weapon-item{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.price-btn{
    background:gold;
    color:black;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}

.price-btn:hover{
    background:lime;
}

/* Вертикальная корзина */
.cart-button{
    position:fixed;
    top:0;
    right:0;
    height:100%;
    width:70px;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    writing-mode:vertical-rl;
    text-orientation:mixed;
    font-weight:bold;
    cursor:pointer;
    border-left:3px solid gold;
}

/* Окно корзины */
.cart-modal{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    padding:20px;
    width:300px;
    max-height:400px;
    overflow-y:auto;
    border:3px solid gold;
    border-radius:15px;
    z-index:1000;
}

.cart-modal h2{
    margin-top:0;
}

.remove{
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

.close-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
    float:right;
}
</style>
</head>

<body>

<div class="container">

<div class="category" onclick="toggleBox('shv')">ШВ</div>
<div id="shv" class="weapon-box">
<div class="weapon-item">M416 <div class="price-btn" onclick="add('M416',35)">35₽</div></div>
<div class="weapon-item">SCAR-L <div class="price-btn" onclick="add('SCAR-L',35)">35₽</div></div>
<div class="weapon-item">AKM <div class="price-btn" onclick="add('AKM',35)">35₽</div></div>
<div class="weapon-item">Гроза <div class="price-btn" onclick="add('Гроза',35)">35₽</div></div>
<div class="weapon-item">AUG <div class="price-btn" onclick="add('AUG',35)">35₽</div></div>
<div class="weapon-item">M762 <div class="price-btn" onclick="add('M762',35)">35₽</div></div>
</div>

<div class="category" onclick="toggleBox('sv')">СВ</div>
<div id="sv" class="weapon-box">
<div class="weapon-item">AWM <div class="price-btn" onclick="add('AWM',99.99)">99.99₽</div></div>
<div class="weapon-item">AMR <div class="price-btn" onclick="add('AMR',89.90)">89.90₽</div></div>
<div class="weapon-item">M24 <div class="price-btn" onclick="add('M24',30)">30₽</div></div>
</div>

<div class="category" onclick="toggleBox('mv')">МВ</div>
<div id="mv" class="weapon-box">
<div class="weapon-item">Mk14 <div class="price-btn" onclick="add('Mk14',65.90)">65.90₽</div></div>
<div class="weapon-item">SLR <div class="price-btn" onclick="add('SLR',20)">20₽</div></div>
<div class="weapon-item">SKS <div class="price-btn" onclick="add('SKS',25)">25₽</div></div>
</div>

<div class="category" onclick="toggleBox('dk')">ДК</div>
<div id="dk" class="weapon-box">
<div class="weapon-item">S12K <div class="price-btn" onclick="add('S12K',15)">15₽</div></div>
<div class="weapon-item">DBS <div class="price-btn" onclick="add('DBS',19.90)">19.90₽</div></div>
</div>

<div class="category" onclick="toggleBox('pp')">ПП</div>
<div id="pp" class="weapon-box">
<div class="weapon-item">UZI <div class="price-btn" onclick="add('UZI',19.90)">19.90₽</div></div>
<div class="weapon-item">JS9 <div class="price-btn" onclick="add('JS9',45)">45₽</div></div>
<div class="weapon-item">P90 <div class="price-btn" onclick="add('P90',75)">75₽</div></div>
</div>

</div>

<!-- Кнопка корзины -->
<div class="cart-button" onclick="openCart()">
🛒 КОРЗИНА
</div>

<!-- Окно корзины -->
<div class="cart-modal" id="cartModal">
<button class="close-btn" onclick="closeCart()">X</button>
<h2>Корзина</h2>
<div id="cartItems"></div>
<hr>
Итого: <span id="total">0</span> ₽
</div>

<script>
let total = 0;

function toggleBox(id){
    const box = document.getElementById(id);
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function add(name, price){
    const cart = document.getElementById("cartItems");
    const item = document.createElement("div");
    item.innerHTML = name + " - " + price + "₽ <button class='remove' onclick='remove(this,"+price+")'>X</button>";
    cart.appendChild(item);

    total += price;
    document.getElementById("total").innerText = total.toFixed(2);
}

function remove(btn, price){
    btn.parentElement.remove();
    total -= price;
    document.getElementById("total").innerText = total.toFixed(2);
}

function openCart(){
    document.getElementById("cartModal").style.display = "block";
}

function closeCart(){
    document.getElementById("cartModal").style.display = "none";
}
</script>

</body>
</html>
