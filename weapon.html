<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оружие</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    backdrop-filter: blur(6px);
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    repeating-linear-gradient(
        0deg,
        rgba(150,150,150,0.2) 0px,
        rgba(150,150,150,0.2) 1px,
        transparent 1px,
        transparent 40px
    ),
    repeating-linear-gradient(
        90deg,
        rgba(150,150,150,0.2) 0px,
        rgba(150,150,150,0.2) 1px,
        transparent 1px,
        transparent 40px
    );
}

/* Стрелка назад */
.back{
    position:fixed;
    top:15px;
    left:15px;
    font-size:28px;
    cursor:pointer;
}

/* Контейнер */
.container{
    padding:70px 20px 120px 20px;
}

.category{
    background:#990000;
    padding:25px;
    margin-bottom:20px;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
}

.weapon-box{
    display:none;
    background:black;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
}

.weapon-item{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.price-btn{
    background:gold;
    color:black;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}

/* 🛒 Корзина */
.cart{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:linear-gradient(145deg,#00aa00,#007700);
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
    border-radius:20px 20px 0 0;
    padding:20px;
    transition:bottom 0.4s;
}

.cart.hide{
    bottom:-85%;
}

.cart-ear{
    position:absolute;
    top:-25px;
    right:20px;
    background:#00aa00;
    padding:5px 15px;
    border-radius:10px 10px 0 0;
    cursor:pointer;
}

/* Колокольчик */
.bell{
    position:fixed;
    bottom:100px;
    right:20px;
    font-size:35px;
}

.bell-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:white;
    border-radius:50%;
    padding:2px 6px;
    font-size:12px;
}

.cart-page{
    display:none;
    padding:80px 20px;
}

.remove{
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⬅</div>

<!-- СТРАНИЦА ОРУЖИЯ -->
<div id="weaponPage" class="container">

<div class="category" onclick="toggleBox('shv')">ШВ</div>
<div id="shv" class="weapon-box">
<div class="weapon-item">M416 <div class="price-btn" onclick="add('M416',35)">35₽</div></div>
<div class="weapon-item">SCAR-L <div class="price-btn" onclick="add('SCAR-L',35)">35₽</div></div>
</div>

<div class="category" onclick="toggleBox('sv')">СВ</div>
<div id="sv" class="weapon-box">
<div class="weapon-item">AWM <div class="price-btn" onclick="add('AWM',99.99)">99.99₽</div></div>
</div>

</div>

<!-- СТРАНИЦА КОРЗИНЫ -->
<div id="cartPage" class="cart-page">
<h2>Корзина</h2>
<div id="cartItems"></div>
<hr>
Итого: <span id="total">0</span> ₽
</div>

<!-- ПЛАВАЮЩАЯ КОРЗИНА -->
<div id="cart" class="cart">
<div class="cart-ear" onclick="toggleCart()">▲</div>
<h3 onclick="openCart()">🛒 Открыть корзину</h3>
</div>

<!-- Колокольчик -->
<div class="bell">
🔔
<div id="bellCount" class="bell-count">0</div>
</div>

<script>
let total=0;
let count=0;

function toggleBox(id){
    const box=document.getElementById(id);
    box.style.display=box.style.display==="block"?"none":"block";
}

function add(name,price){
    const item=document.createElement("div");
    item.innerHTML=name+" - "+price+"₽ <button class='remove' onclick='remove(this,"+price+")'>X</button>";
    document.getElementById("cartItems").appendChild(item);
    total+=price;
    count++;
    update();
}

function remove(btn,price){
    btn.parentElement.remove();
    total-=price;
    count--;
    update();
}

function update(){
    document.getElementById("total").innerText=total.toFixed(2);
    document.getElementById("bellCount").innerText=count;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("hide");
}

function openCart(){
    document.getElementById("weaponPage").style.display="none";
    document.getElementById("cartPage").style.display="block";
}

function goBack(){
    if(document.getElementById("cartPage").style.display==="block"){
        document.getElementById("cartPage").style.display="none";
        document.getElementById("weaponPage").style.display="block";
    } else {
        window.location.href="index.html";
    }
}
</script>

</body>
</html>
