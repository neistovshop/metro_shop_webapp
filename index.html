<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>METRO SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🔥 METRO SHOP</h1>
  <div class="catalog">
    <div class="item">
      <img src="https://i.imgur.com/your_weapon_image.jpg" alt="Оружие">
      <p>🔫 Оружие — 50 руб</p>
      <button onclick="buy('Оружие',50)">Купить</button>
    </div>
    <div class="item">
      <img src="https://i.imgur.com/your_armor_image.jpg" alt="Броня">
      <p>🛡 Броня — 30 руб</p>
      <button onclick="buy('Броня',30)">Купить</button>
    </div>
    <div class="item">
      <img src="https://i.imgur.com/your_backpack_image.jpg" alt="Рюкзак">
      <p>🎒 Рюкзак — 25 руб</p>
      <button onclick="buy('Рюкзак',25)">Купить</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
