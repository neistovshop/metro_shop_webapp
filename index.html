<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Неистов</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,0,0.35), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(0,0,255,0.35), transparent 60%),
        #111;
}

/* ===== Заголовок ===== */
.header-wrapper{
    position:relative;
    text-align:center;
    margin-top:25px;
}

.header-title{
    font-size:48px;
    font-weight:bold;
    color:#0f0cff;
    text-shadow:
        0 0 5px #0f0cff,
        0 0 10px #ff00ff,
        0 0 20px #ff0000;
}

/* Фото слева и справа */
.header-img{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    position:absolute;
    top:0;
}

.left-img{ left:15px; }
.right-img{ right:15px; }

/* ===== Карточки ===== */
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:0.5cm;
    padding:30px 15px;
}

.card{
    width:280px;
    background:rgba(0,0,0,0.6);
    border-radius:12px;
    padding:15px;
    text-align:center;
    transition:0.2s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    border-radius:8px;
}

.card-title{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin:20px 0;
}
</style>
</head>

<body>

<div class="header-wrapper">
    <img src="images/channel.jpg" class="header-img left-img" alt="Канал">
    <div class="header-title">Неистов</div>
    <img src="images/reviews.jpg" class="header-img right-img" alt="Отзывы">
</div>

<div class="cards">

    <div class="card">
        <img src="images/mk14.jpg" alt="Оружие">
        <div class="card-title">Оружие</div>
    </div>

    <div class="card">
        <img src="images/armor6.jpg" alt="Броня">
        <div class="card-title">Броня</div>
    </div>

    <div class="card">
        <img src="images/arm_fabric.jpg" alt="Аксессуары для брони">
        <div class="card-title">Аксессуары для брони</div>
    </div>

    <div class="card">
        <img src="images/ice_arbitr.jpg" alt="Предметы сказочного качества">
        <div class="card-title">Предметы сказочного качества</div>
    </div>

    <div class="card">
        <img src="images/black_letter.jpg" alt="Дополнительные аксессуары">
        <div class="card-title">Дополнительные аксессуары</div>
    </div>

    <div class="card">
        <img src="images/3_characters.jpg" alt="Сопровождение">
        <div class="card-title">Сопровождение</div>
    </div>

    <div class="card">
        <img src="images/metro_currency.jpg" alt="Буст баланса">
        <div class="card-title">Буст баланса</div>
    </div>

    <div class="card">
        <img src="images/warehouse.jpg" alt="Продажа вещей">
        <div class="card-title">Продажа вещей</div>
    </div>

</div>

<div class="footer">© 2026</div>

</body>
</html>
