<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>НЕИСТОВ</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* Видео на заднем фоне */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1; /* под контентом */
}

/* Контент поверх видео */
.content {
    position: relative;
    z-index: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Заголовок */
h1 {
    font-size: 8vw;
    margin-bottom: 30px;
    text-align: center;
    color: #ff4747;
}

/* Сетка карточек */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    max-width: 1200px;
}

/* Карточка */
.card {
    border-radius: 15px;
    flex: 1 1 calc(33.33% - 20px); /* 3 в ряд на ПК */
    max-width: 220px;
    min-width: 140px;
    text-align: center;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    background: rgba(0,0,0,0.5); /* полупрозрачный фон, чтобы текст был виден на видео */
}

.card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 6px;
}

.card span {
    font-size: 2.5vw;
    font-weight: bold;
    word-wrap: break-word;
}

/* Цвета фонов карточек */
.card.weapon { background: #8a2be2; }           /* фиолетовый */
.card.armor { background: #ff0000; }            /* красный */
.card.armor_accessories { background: #8a2be2; } /* фиолетовый */
.card.legendary_items { background: #ff8c00; }   /* оранжевый */
.card.extra_accessories { background: #8b0000; } /* тёмно-красный */
.card.companions { background: #4b0082; }       /* индиго */
.card.balance_boost { background: #ffd700; }    /* золотой */
.card.warehouse { background: #696969; }        /* серый */

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* Адаптив */
@media (max-width: 900px) { .card { flex: 1 1 calc(50% - 15px); } }
@media (max-width: 600px) { 
    .card { flex: 1 1 100%; } 
    h1 { font-size: 12vw; } 
    .card span { font-size: 4vw; } 
}
</style>
</head>
<body>

<!-- Видеофон -->
<video id="bg-video" autoplay muted loop>
    <source src="video/background.mp4" type="video/mp4">
    Ваш браузер не поддерживает видеофон.
</video>

<div class="content">
    <h1>НЕИСТОВ</h1>

    <div class="grid">
        <!-- Карточки -->
        <div class="card weapon" onclick="window.location.href='weapon.html'">
            <img src="images/mk14.png" alt="Оружие МК14">
            <span>Оружие</span>
        </div>

        <div class="card armor" onclick="window.location.href='armor.html'">
            <img src="images/armor6.png" alt="Броня 6 уровня">
            <span>Броня</span>
        </div>

        <div class="card armor_accessories" onclick="window.location.href='armor_accessories.html'">
            <img src="images/arm_fabric.png" alt="Освинцованная ткань">
            <span>Аксессуары для брони</span>
        </div>

        <div class="card legendary_items" onclick="window.location.href='legendary_items.html'">
            <img src="images/ice_arbiter.png" alt="Ледяной арбитр">
            <span>Предметы сказочного качества</span>
        </div>

        <div class="card extra_accessories" onclick="window.location.href='extra_accessories.html'">
            <img src="images/black_letter.png" alt="Письмо с поролем">
            <span>Дополнительные аксессуары</span>
        </div>

        <div class="card companions" onclick="window.location.href='companions.html'">
            <img src="images/3_characters.png" alt="3 персонажа в броне">
            <span>Сопровождение</span>
        </div>

        <div class="card balance_boost" onclick="window.location.href='balance_boost.html'">
            <img src="images/metro_currency.png" alt="Внутриигровая валюта">
            <span>Буст баланса</span>
        </div>

        <div class="card warehouse" onclick="window.location.href='warehouse.html'">
            <img src="images/warehouse.png" alt="Склад с ящиками">
            <span>Продажа вещей</span>
        </div>
    </div>
</div>

</body>
</html>
