<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>НЕИСТОВ</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    color: white;

    /* Анимированный фон красный -> желтый */
    background: linear-gradient(270deg, #ff0000, #ffd700, #ff0000);
    background-size: 600% 600%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Контейнер надписи и фото канала/отзывов */
.header-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

/* Фото отзывов слева */
.reviews-photo {
    width: 8vw;
    height: 8vw;
    border: 3px solid #8b4513; /* коричневый контур */
    border-radius: 15px;
    overflow: hidden;
    flex-shrink: 0;
}

/* Фото канала справа */
.channel-photo {
    width: 8vw;
    height: 8vw;
    border: 3px solid white;
    border-radius: 15px;
    overflow: hidden;
    flex-shrink: 0;
}

/* Фото внутри контуров */
.channel-photo img, .reviews-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Надпись НЕИСТОВ */
h1 {
    font-size: 8vw;
    color: #ff4747;
    margin: 0;
    padding: 10px 20px;
    border: 3px solid #ff4747;
    border-radius: 15px;
    text-align: center;
}

/* Сетка карточек */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    max-width: 1200px;
}

/* Карточка */
.card {
    border-radius: 15px;
    flex: 1 1 calc(33.33% - 20px); 
    max-width: 220px;
    min-width: 140px;
    text-align: center;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    background: #ff0000; /* красный фон для всех карточек */
}

.card img {
    width: 100%;
    height: 140px; /* одинаковая высота для всех фото */
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 6px;
}

.card span {
    font-size: 2.5vw;
    font-weight: bold;
    word-wrap: break-word;
    color: white;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* Адаптив */
@media (max-width: 900px) { .card { flex: 1 1 calc(50% - 15px); } }
@media (max-width: 600px) { 
    .card { flex: 1 1 100%; } 
    h1 { font-size: 12vw; } 
    .card span { font-size: 4vw; } 
    .header-container {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>
<body>

<div class="content">
    <!-- Заголовок и фото -->
    <div class="header-container">
        <div class="reviews-photo">
            <img src="images/reviews.png" alt="Отзывы канала">
        </div>

        <h1>НЕИСТОВ</h1>

        <div class="channel-photo">
            <img src="images/channel.png" alt="Фото канала">
        </div>
    </div>

    <!-- Сетка карточек -->
    <div class="grid">
        <div class="card" onclick="window.location.href='weapon.html'">
            <img src="images/mk14.png" alt="Оружие МК14">
            <span>Оружие</span>
        </div>

        <div class="card" onclick="window.location.href='armor.html'">
            <img src="images/armor6.png" alt="Броня 6 уровня">
            <span>Броня</span>
        </div>

        <div class="card" onclick="window.location.href='armor_accessories.html'">
            <img src="images/arm_fabric.png" alt="Освинцованная ткань">
            <span>Аксессуары для брони</span>
        </div>

        <div class="card" onclick="window.location.href='legendary_items.html'">
            <img src="images/ice_arbiter.png" alt="Ледяной арбитр">
            <span>Предметы сказочного качества</span>
        </div>

        <div class="card" onclick="window.location.href='extra_accessories.html'">
            <img src="images/black_letter.png" alt="Письмо с поролем">
            <span>Дополнительные аксессуары</span>
        </div>

        <div class="card" onclick="window.location.href='companions.html'">
            <img src="images/3_characters.png" alt="3 персонажа в броне">
            <span>Сопровождение</span>
        </div>

        <div class="card" onclick="window.location.href='balance_boost.html'">
            <img src="images/metro_currency.png" alt="Внутриигровая валюта">
            <span>Буст баланса</span>
        </div>

        <div class="card" onclick="window.location.href='warehouse.html'">
            <img src="images/warehouse.png" alt="Склад с ящиками">
            <span>Продажа вещей</span>
        </div>
    </div>
</div>

</body>
</html>
