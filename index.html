<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Неистов</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    color: white;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,0,0.3), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(0,0,255,0.3), transparent 60%),
        #111;
    backdrop-filter: blur(10px);
}

/* Заголовок Неистов */
.header {
    text-align: center;
    font-size: 50px;
    font-weight: bold;
    color: #0f0cff;
    text-shadow:
        0 0 5px #0f0cff,
        0 0 10px #ff00ff,
        0 0 20px #ff0000;
    margin: 30px 0;
}

/* Контейнер карточек */
.cards-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1cm; /* отступ между карточками */
    padding: 20px;
}

/* Карточки */
.card {
    background: rgba(0,0,0,0.6);
    border-radius: 12px;
    width: calc(30% - 0.66cm); /* три в ряд с отступом */
    text-align: center;
    padding: 20px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

/* Фото внутри карточки */
.card img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* Название карточки */
.card-title {
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="header">Неистов</div>

<div class="cards-container">
    <div class="card" onclick="window.location.href='weapon.html'">
        <img src="images/mk14.jpg" alt="Оружие">
        <div class="card-title">Оружие</div>
    </div>
    <div class="card" onclick="window.location.href='armor.html'">
        <img src="images/armor6.jpg" alt="Броня">
        <div class="card-title">Броня</div>
    </div>
    <div class="card" onclick="window.location.href='accessory.html'">
        <img src="images/ice_arbitr.jpg" alt="Аксессуары">
        <div class="card-title">Аксессуары</div>
    </div>
</div>

</body>
</html>
