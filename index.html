<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🔥 METRO SHOP 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #1b1b1b;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #ff4c4c;
            margin-bottom: 20px;
        }

        .shop {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c2c2c;
            border-radius: 10px;
            padding: 15px;
            transition: transform 0.2s;
        }

        .item:hover {
            transform: scale(1.03);
        }

        .item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
        }

        .item-info {
            flex: 1;
            margin-left: 15px;
        }

        .item-info h3 {
            margin: 0;
            font-size: 18px;
        }

        .item-info p {
            margin: 5px 0 0 0;
            color: #aaa;
        }

        .buy-btn {
            background: #ff4c4c;
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background: #ff1f1f;
        }
    </style>
</head>
<body>
    <h1>🔥 METRO SHOP 🔥</h1>
    <div class="shop">
        <div class="item">
            <img src="https://i.imgur.com/5cFj5gN.png" alt="Оружие">
            <div class="item-info">
                <h3>Оружие</h3>
                <p>Цена: 50₽</p>
            </div>
            <button class="buy-btn" onclick="buy('Оружие', 50)">Купить</button>
        </div>

        <div class="item">
            <img src="https://i.imgur.com/O5rkD3F.png" alt="Броня">
            <div class="item-info">
                <h3>Броня</h3>
                <p>Цена: 30₽</p>
            </div>
            <button class="buy-btn" onclick="buy('Броня', 30)">Купить</button>
        </div>

        <div class="item">
            <img src="https://i.imgur.com/jwXb2uB.png" alt="Рюкзак">
            <div class="item-info">
                <h3>Рюкзак</h3>
                <p>Цена: 25₽</p>
            </div>
            <button class="buy-btn" onclick="buy('Рюкзак', 25)">Купить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function buy(item, price) {
            tg.sendData(item + " - " + price + "₽");
            alert("✅ Заказ отправлен: " + item + " - " + price + "₽");
        }
    </script>
</body>
</html>
