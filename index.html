<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>НЕИСТОВ</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* Видео на заднем фоне */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1; /* под контентом */
}

/* Контент поверх видео */
.content {
    position: relative;
    z-index: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Сетка карточек */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    max-width: 1200px;
}

.card {
    border-radius: 15px;
    flex: 1 1 calc(33.33% - 20px);
    max-width: 220px;
    min-width: 140px;
    text-align: center;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    background: rgba(0,0,0,0.5); /* полупрозрачный фон, чтобы текст был виден */
}

.card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 6px;
}

.card span {
    font-size: 2.5vw;
    font-weight: bold;
    word-wrap: break-word;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

h1 {
    font-size: 8vw;
    margin-bottom: 30px;
    text-align: center;
    color: #ff4747;
}

/* Адаптив */
@media (max-width: 900px) { .card { flex: 1 1 calc(50% - 15px); } }
@media (max-width: 600px) { .card { flex: 1 1 100%; } h1{font-size:12vw;} .card span{font-size:4vw;} }
</style>
</head>
<body>

<!-- Видеофон -->
<video id="bg-video" autoplay muted loop>
    <source src="video/background.mp4" type="video/mp4">
    Ваш браузер не поддерживает видеофон.
</video>

<div class="content">
    <h1>НЕИСТОВ</h1>
    <div class="grid">
        <div class="card weapon" onclick="window.location.href='weapon.html'">
            <img src="images/mk14.png" alt="Оружие МК14">
            <span>Оружие</span>
        </div>

        <div class="card armor" onclick="window.location.href='armor.html'">
            <img src="images/armor6.png" alt="Броня 6 уровня">
            <span>Броня</span>
        </div>

        <div class="card warehouse" onclick="window.location.href='warehouse.html'">
            <img src="images/warehouse.png" alt="Склад с ящиками">
            <span>Продажа вещей</span>
        </div>

        <!-- остальные карточки... -->
    </div>
</div>

</body>
</html>
