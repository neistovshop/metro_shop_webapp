<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Неистов</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,0,0.3), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(0,0,255,0.3), transparent 60%),
        #111;
    backdrop-filter: blur(10px);
}

/* ===== Заголовок ===== */
.header-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 20px;
    position: relative;
}

.header {
    font-size: 50px;
    font-weight: bold;
    color: #0f0cff;
    text-shadow:
        0 0 5px #0f0cff,
        0 0 10px #ff00ff,
        0 0 20px #ff0000;
}

/* Фото по бокам */
.header-img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    position: absolute;
    top: 0;
}

.channel-img { left: 10px; }
.reviews-img { right: 10px; }

/* ===== Карточки ===== */
.cards-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5cm;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.6);
    border-radius: 12px;
    width: calc(30% - 0.33cm);
    text-align: center;
    padding: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

.card img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
}

.card-title {
    font-size: 20px;
    font-weight: bold;
}

/* ===== Подвал ===== */
.footer {
    text-align: center;
    margin: 20px 0;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="header-container">
    <img src="images/channel.jpg" alt="Канал" class="header-img channel-img">
    <div class="header">Неистов</div>
    <img src="images/reviews.jpg" alt="Отзывы" class="header-img reviews-img">
</div>

<div class="cards-container">

    <div class="card">
        <img src="images/mk14.jpg" alt="Оружие">
        <div class="card-title">Оружие</div>
    </div>

    <div class="card">
        <img src="images/armor6.jpg" alt="Броня">
        <div class="card-title">Броня</div>
    </div>

    <div class="card">
        <img src="images/arm_fabric.jpg" alt="Аксессуары для брони">
        <div class="card-title">Аксессуары для брони</div>
    </div>

    <!-- ВОТ НУЖНАЯ КАРТОЧКА -->
    <div class="card">
        <img src="images/ice_arbitr.jpg" alt="Предметы сказочного качества">
        <div class="card-title">Предметы сказочного качества</div>
    </div>

    <div class="card">
        <img src="images/black_letter.jpg" alt="Дополнительные аксессуары">
        <div class="card-title">Дополнительные аксессуары</div>
    </div>

    <div class="card">
        <img src="images/3_characters.jpg" alt="Сопровождение">
        <div class="card-title">Сопровождение</div>
    </div>

    <div class="card">
        <img src="images/metro_currency.jpg" alt="Буст баланса">
        <div class="card-title">Буст баланса</div>
    </div>

    <div class="card">
        <img src="images/warehouse.jpg" alt="Продажа вещей">
        <div class="card-title">Продажа вещей</div>
    </div>

</div>

<div class="footer">© 2026. Все права принадлежат автору.</div>

</body>
</html>
