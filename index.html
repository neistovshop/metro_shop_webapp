<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>НЕИСТОВ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(270deg, #fff200, #bfff8c, #fff200);
    background-size: 600% 600%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Контейнер заголовка и фото на одной линии */
.header-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px; /* уменьшили расстояние между фото и надписью */
    margin-bottom: 40px;
    flex-wrap: nowrap;
}

/* Фото отзывов и канала */
.reviews-photo, .channel-photo {
    width: 14vw;   /* немного меньше, ближе к тексту */
    height: 14vw;
    border-radius: 15px;
    overflow: hidden;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
}

.reviews-photo:hover, .channel-photo:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00ffea;
}

.reviews-photo img, .channel-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Надпись НЕИСТОВ */
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 12vw;
    color: black;
    margin: 0;
    padding: 15px 20px;
    text-align: center;
    text-shadow: 
        0 0 5px #0000ff, 
        0 0 10px #0000ff, 
        0 0 15px #1e90ff, 
        0 0 20px #00ffff;
    flex-shrink: 0;
}

/* Сетка карточек */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    max-width: 1200px;
}

/* Карточка уменьшена для 3 в ряд */
.card {
    border-radius: 15px;
    flex: 1 1 calc(33.33% - 20px); 
    max-width: 250px;
    min-width: 160px;
    text-align: center;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    background: #ff0000;
    box-shadow: 0 0 15px #ff0000;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 8px;
}

.card span {
    font-size: 2.5vw;
    font-weight: bold;
    word-wrap: break-word;
    color: white;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #ffd700, 0 0 40px #ff7f50;
}

/* Подпись внизу */
.footer {
    text-align: center;
    margin-top: 40px;
    font-family: 'Indie Flower', cursive;
    font-size: 3vw;
    color: black;
}

/* Адаптив */
@media (max-width: 900px) { 
    .card { flex: 1 1 calc(50% - 15px); } 
}
@media (max-width: 600px) { 
    .card { flex: 1 1 100%; } 
    h1 { font-size: 14vw; } 
    .card span { font-size: 4.5vw; } 
    .reviews-photo, .channel-photo { width: 25vw; height: 25vw; }
    .footer { font-size: 5vw; }
    .header-container { flex-wrap: wrap; gap: 10px; justify-content: center; }
}
</style>
</head>
<body>

<div class="content">
    <!-- Заголовок и фото -->
    <div class="header-container">
        <div class="reviews-photo" onclick="window.location.href='https://t.me/+z3Sq0wy_iTM5ZmJi'">
            <img src="images/reviews.png" alt="Отзывы канала">
        </div>

        <h1>НЕИСТОВ</h1>

        <div class="channel-photo" onclick="window.location.href='https://t.me/neistovgo'">
            <img src="images/channel.png" alt="Фото канала">
        </div>
    </div>

    <!-- Сетка карточек -->
    <div class="grid">
        <div class="card" onclick="window.location.href='weapon.html'">
            <img src="images/mk14.png" alt="Оружие МК14">
            <span>Оружие</span>
        </div>

        <div class="card" onclick="window.location.href='armor.html'">
            <img src="images/armor6.png" alt="Броня 6 уровня">
            <span>Броня</span>
        </div>

        <div class="card" onclick="window.location.href='armor_accessories.html'">
            <img src="images/arm_fabric.png" alt="Освинцованная ткань">
            <span>Аксессуары для брони</span>
        </div>

        <div class="card" onclick="window.location.href='legendary_items.html'">
            <img src="images/ice_arbiter.png" alt="Ледяной арбитр">
            <span>Предметы сказочного качества</span>
        </div>

        <div class="card" onclick="window.location.href='extra_accessories.html'">
            <img src="images/black_letter.png" alt="Письмо с поролем">
            <span>Дополнительные аксессуары</span>
        </div>

        <div class="card" onclick="window.location.href='companions.html'">
            <img src="images/3_characters.png" alt="3 персонажа в броне">
            <span>Сопровождение</span>
        </div>

        <div class="card" onclick="window.location.href='balance_boost.html'">
            <img src="images/metro_currency.png" alt="Внутриигровая валюта">
            <span>Буст баланса</span>
        </div>

        <div class="card" onclick="window.location.href='warehouse.html'">
            <img src="images/warehouse.png" alt="Склад с ящиками">
            <span>Продажа вещей</span>
        </div>
    </div>

    <!-- Подпись внизу -->
    <div class="footer">
        © 2026. Все права принадлежат автору.
    </div>
</div>

</body>
</html>
