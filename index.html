<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>НЕИСТОВ</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
}

/* Заголовок */
h1 {
    text-align: center;
    font-size: 10vw;
    color: #ff4747;
    margin-bottom: 30px;
}

/* Контейнер карточек */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
}

/* Карточка */
.card {
    background: #1e1e1e;
    border-radius: 15px;
    width: 30%;
    min-width: 150px;
    max-width: 200px;
    text-align: center;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}

.card:hover {
    transform: scale(1.05);
    background: #2c2c2c;
}

/* Изображение карточки */
.card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* Название */
.card span {
    font-size: 4vw;
    font-weight: bold;
}

/* Адаптив для телефонов */
@media (max-width: 600px) {
    .card {
        width: 45%;
    }
    h1 {
        font-size: 15vw;
    }
    .card span {
        font-size: 5vw;
    }
}
</style>
</head>

<body>

<h1>НЕИСТОВ</h1>

<div class="grid">

    <!-- Оружие -->
    <div class="card" onclick="window.location.href='weapon.html'">
        <img src="https://i.imgur.com/MC14.png" alt="Оружие МК14">
        <span>Оружие</span>
    </div>

    <!-- Броня -->
    <div class="card" onclick="window.location.href='armor.html'">
        <img src="https://i.imgur.com/Armor6.png" alt="Броня 6 уровня">
        <span>Броня</span>
    </div>

    <!-- Аксессуары для брони -->
    <div class="card" onclick="window.location.href='armor_accessories.html'">
        <img src="https://i.imgur.com/ArmFabric.png" alt="Освинцованная ткань">
        <span>Аксесуары для брони</span>
    </div>

    <!-- Предметы сказочного качества -->
    <div class="card" onclick="window.location.href='legendary_items.html'">
        <img src="https://i.imgur.com/IceArbiter.png" alt="Ледяной арбитр">
        <span>Предметы сказочного качества</span>
    </div>

    <!-- Дополнительные аксессуары -->
    <div class="card" onclick="window.location.href='extra_accessories.html'">
        <img src="https://i.imgur.com/BlackLetter.png" alt="Письмо с поролем черное">
        <span>Дополнительные аксессуары</span>
    </div>

    <!-- Сопровождение -->
    <div class="card" onclick="window.location.href='companions.html'">
        <img src="https://i.imgur.com/3Characters.png" alt="3 персонажа в броне 6 уровня">
        <span>Сопровождение</span>
    </div>

    <!-- Буст баланса -->
    <div class="card" onclick="window.location.href='balance_boost.html'">
        <img src="https://i.imgur.com/MetroCurrency.png" alt="Внутриигровая валюта">
        <span>Буст баланса</span>
    </div>

</div>

</body>
</html>
