<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🔥 METRO SHOP 🔥</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
}

h1 {
    text-align: center;
    color: #ff4747;
    margin-bottom: 20px;
}

.shop {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.item {
    background: #1e1e1e;
    padding: 15px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.item img {
    width: 100px;
    height: 100px;
    border-radius: 12px;
}

.item-info {
    flex: 1;
}

.item-info span {
    font-size: 18px;
    font-weight: bold;
}

.item button {
    background: #ff4747;
    border: none;
    padding: 12px 20px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.cart {
    margin-top: 25px;
    padding: 15px;
    background: #1e1e1e;
    border-radius: 12px;
}

.total {
    margin-top: 10px;
    font-size: 18px;
}

.checkout {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    background: #00c853;
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🔥 METRO SHOP 🔥</h1>

<div class="shop">
    <div class="item">
        <img src="https://i.imgur.com/5cFj5gN.png" alt="Оружие">
        <div class="item-info"><span>🔫 Оружие — 50₽</span></div>
        <button onclick="addToCart('Оружие', 50)">Добавить</button>
    </div>

    <div class="item">
        <img src="https://i.imgur.com/O5rkD3F.png" alt="Броня">
        <div class="item-info"><span>🛡 Броня — 30₽</span></div>
        <button onclick="addToCart('Броня', 30)">Добавить</button>
    </div>

    <div class="item">
        <img src="https://i.imgur.com/jwXb2uB.png" alt="Рюкзак">
        <div class="item-info"><span>🎒 Рюкзак — 25₽</span></div>
        <button onclick="addToCart('Рюкзак', 25)">Добавить</button>
    </div>
</div>

<div class="cart">
    <h3>🛒 Корзина</h3>
    <div id="cart-items"></div>
    <div class="total">Итого: <span id="total">0</span>₽</div>
    <button class="checkout" onclick="checkout()">Оформить заказ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let cart = [];
let total = 0;

function addToCart(item, price) {
    cart.push({item, price});
    total += price;
    updateCart();
}

function updateCart() {
    const cartDiv = document.getElementById("cart-items");
    cartDiv.innerHTML = "";
    cart.forEach(product => {
        cartDiv.innerHTML += `<div>${product.item} - ${product.price}₽</div>`;
    });
    document.getElementById("total").innerText = total;
}

function checkout() {
    if(cart.length === 0) {
        alert("Корзина пустая!");
        return;
    }

    let orderText = "🛒 Новый заказ:\n";
    cart.forEach(product => {
        orderText += product.item + " - " + product.price + "₽\n";
    });
    orderText += "\nИтого: " + total + "₽";

    tg.sendData(orderText);
}
</script>

</body>
</html>
